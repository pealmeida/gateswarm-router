name: CI

on:
  push:
    branches: [main, v0.5.1-stable]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
